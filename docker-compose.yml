services:
  postgres:
    image: postgres:16
    container_name: restodici-db
    restart: always
    environment:
      POSTGRES_USER: restodici_user
      POSTGRES_PASSWORD: restodici_password
      POSTGRES_DB: restodici_db
    ports:
      - "5433:5432"  # ← Mac: port 5433 pour éviter conflits
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: restodici-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: