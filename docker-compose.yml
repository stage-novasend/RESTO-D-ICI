# docker-compose.yml (extrait)
services:
  db:
    image: postgres:15-alpine
    container_name: restodici-db
    environment:
      POSTGRES_USER: restodici_user
      POSTGRES_PASSWORD: restodici_pass
      POSTGRES_DB: restodici_db
    ports:
      - "5433:5432"  
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restodici_user -d restodici_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: restodici-redis
    ports:
      - "6379:6379"

volumes:
  pgdata: